services:
  - type: web
    name: podcast-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "python3 startup_and_seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smart-recruiter-db
          property: connectionString
